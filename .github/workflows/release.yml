name: Release

# Cut a release by pushing a SemVer tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# This builds a multi-arch image, pushes it to GHCR, cosign-signs it,
# packages the Helm chart, and creates a GitHub Release with both attached.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (without leading v), e.g. 0.1.0'
        required: true
        type: string

permissions:
  contents: write      # create the GitHub Release
  packages: write      # push to GHCR
  id-token: write      # OIDC keyless cosign signing

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/launchpad

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid SemVer: $VERSION (expected e.g. 0.1.0)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

  image:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

  chart:
    name: Package Helm chart
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Set chart + app version and package
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          helm package helm/launchpad \
            --version "$VERSION" \
            --app-version "$VERSION" \
            --destination dist
          ls -la dist

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/*.tgz

      - name: Log in to GHCR (for OCI chart push)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR (OCI)
        run: |
          helm push dist/launchpad-${{ needs.prepare.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, image, chart]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Arc Launchpad v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: dist/*.tgz
          body: |
            Arc Launchpad v${{ needs.prepare.outputs.version }}

            **Container image**
            ```
            ghcr.io/${{ github.repository_owner }}/launchpad:${{ needs.prepare.outputs.version }}
            ```

            **Run with Docker Compose**
            ```bash
            curl -O https://raw.githubusercontent.com/${{ github.repository }}/v${{ needs.prepare.outputs.version }}/docker-compose.yml
            LAUNCHPAD_JWT_SECRET=$(openssl rand -hex 32) docker compose up -d
            ```

            **Install with Helm**
            ```bash
            helm install launchpad ./launchpad-${{ needs.prepare.outputs.version }}.tgz \
              --set jwtSecret=$(openssl rand -hex 32)
            ```
